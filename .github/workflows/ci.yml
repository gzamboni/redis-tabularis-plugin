name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'

    - name: Build
      run: go build -v ./...

    - name: Test Unit
      run: go test -v ./...

    - name: Test E2E
      run: |
        chmod +x run_e2e.sh
        ./run_e2e.sh
