version: 2

project_name: tabularis-redis-plugin-go

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/tabularis-redis-plugin-go
    binary: tabularis-redis-plugin-go

archives:
  - format: zip
    name_template: "tabularis-redis-plugin-go-{{ .Os }}-{{ .Arch }}"
    files:
      - manifest.json
      - README.md
      - LICENSE

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
